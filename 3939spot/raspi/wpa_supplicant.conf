# ============================================================
# wpa_supplicant.conf — 3939SPOT Raspberry Pi Wi-Fi 設定
# 16.5: wpa_supplicant（アップストリーム Wi-Fi 接続）設定
#
# wlan0 は hostapd でゲスト AP として使用するため、
# アップストリーム接続が必要な場合は wlan1（USB Wi-Fi ドングル等）を使用。
# 有線 (eth0) でインターネット接続する場合はこのファイルは不要。
# ============================================================

country=JP
ctrl_interface=DIR=/var/run/wpa_supplicant GROUP=netdev
update_config=1

# ── アップストリーム Wi-Fi（管理用・インターネット側） ────────
# eth0 を使用する場合はこのセクション不要
# wlan1 等の別インターフェースでアップストリーム接続する場合に設定

network={
    # アップストリームの SSID（管理者ネットワーク）
    ssid="YOUR_UPSTREAM_SSID"

    # WPA2-PSK 認証
    psk="YOUR_UPSTREAM_PASSWORD"

    # 優先度（数値が大きいほど優先）
    priority=1

    # キースキャン設定
    key_mgmt=WPA-PSK
    proto=RSN
    pairwise=CCMP
    group=CCMP
}
