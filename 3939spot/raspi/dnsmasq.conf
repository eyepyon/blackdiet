# ============================================================
# dnsmasq.conf — 3939SPOT キャプティブポータル DHCP/DNS 設定
# 16.2: dnsmasq 設定
# ============================================================

# ── インターフェース ──────────────────────────────────────────
# wlan0 のみ DHCP を提供する（eth0 はインターネット側）
interface=wlan0
bind-interfaces

# ── DHCP 設定 ─────────────────────────────────────────────────
# ゲスト用サブネット: 192.168.50.0/24
# ゲートウェイ（Raspberry Pi）: 192.168.50.1
dhcp-range=192.168.50.10,192.168.50.200,255.255.255.0,12h

# デフォルトゲートウェイをクライアントに通知
dhcp-option=3,192.168.50.1

# DNS サーバーをクライアントに通知（Raspberry Pi 自身を指定）
dhcp-option=6,192.168.50.1

# ── DNS 設定 ──────────────────────────────────────────────────
# キャプティブポータル検出用: 全 DNS クエリを Raspberry Pi に向ける
# （ゲストが任意のドメインにアクセスしようとした際にポータルページへ転送）
address=/#/192.168.50.1

# Raspberry Pi 自身のホスト名を解決
address=/raspberrypi.local/192.168.50.1

# ── ログ設定 ──────────────────────────────────────────────────
log-queries
log-dhcp
log-facility=/var/log/dnsmasq.log

# ── セキュリティ ──────────────────────────────────────────────
# ローカルのみ（外部の DNS リゾルバとして使用させない）
local-service

# DNSSEC 検証（オプション）
# dnssec
