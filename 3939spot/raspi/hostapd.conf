# ============================================================
# hostapd.conf — 3939SPOT キャプティブポータル AP 設定
# 16.1: hostapd（ソフトウェアアクセスポイント）設定
# ============================================================

# ── インターフェース設定 ──────────────────────────────────────
interface=wlan0
driver=nl80211

# ── AP 基本設定 ───────────────────────────────────────────────
# SSID（ゲスト用。実環境に合わせて変更すること）
ssid=3939SPOT-Guest

# 2.4GHz 帯 チャンネル 6（日本国内で安定した選択）
hw_mode=g
channel=6

# 国コード（電波法準拠）
country_code=JP

# IEEE 802.11n（HT）対応
ieee80211n=1
wmm_enabled=1

# ── セキュリティ設定 ─────────────────────────────────────────
# キャプティブポータル用のオープンネットワーク（認証はポータルで実施）
auth_algs=1
ignore_broadcast_ssid=0

# ── 接続クライアント制限 ──────────────────────────────────────
# 同時接続最大 30 台（スポットの規模に応じて調整）
max_num_sta=30

# ── ログレベル ────────────────────────────────────────────────
# 0=verbose, 1=debug, 2=info, 3=notice, 4=warning
logger_syslog=-1
logger_syslog_level=2
logger_stdout=-1
logger_stdout_level=2
