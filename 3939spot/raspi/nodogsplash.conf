# ============================================================
# nodogsplash.conf — 3939SPOT キャプティブポータル設定
# 16.3: nodogsplash（キャプティブポータルデーモン）設定
# ============================================================

GatewayInterface wlan0

# ── ゲートウェイ設定 ──────────────────────────────────────────
GatewayAddress 192.168.50.1
GatewayPort 2050

# ── FAS（Forward Authentication Service）設定 ─────────────────
# 3939SPOT ポータルページへリダイレクト
# RASPI_SPOT_UUID は実際の Spot UUID に置き換えること
# 例: sudo sed -i "s/RASPI_SPOT_UUID/your-uuid/g" /etc/nodogsplash/nodogsplash.conf
fasport 443
fasremotefqdn 3939.spot
fasremotepath /portal
fasquerystring spot_id=RASPI_SPOT_UUID

# FAS 完全 URL（参考）
# https://3939.spot/portal?spot_id=RASPI_SPOT_UUID

# ── 帯域制限 ─────────────────────────────────────────────────
# ゲスト1人あたりのダウンロード/アップロード上限（kbit/s）
# 0 = 無制限
DownloadLimit 2048
UploadLimit 1024

# ── タイムアウト設定 ──────────────────────────────────────────
# 認証後のセッション有効時間（秒）= 2時間
SessionTimeout 7200

# アイドルタイムアウト（秒）= 30分
IdleTimeout 1800

# ── ホワイトリスト ────────────────────────────────────────────
# 認証前にアクセスを許可するドメイン/IP
# LINE ログイン認証に必要なドメイン
FirewallRuleSet preauthenticated-users {
    FirewallRule allow tcp to 3939.spot
    FirewallRule allow tcp to access.line.me
    FirewallRule allow tcp to api.line.me
    FirewallRule allow udp port 53
    FirewallRule allow tcp port 443 to 8.8.8.8
    FirewallRule allow tcp port 443 to 8.8.4.4
}

# 認証済みユーザーはすべて許可
FirewallRuleSet authenticated-users {
    FirewallRule allow all
}

# ── ログ設定 ──────────────────────────────────────────────────
# syslog に出力
Syslog on

# デバッグレベル（0=off, 1=error, 2=warn, 3=info, 4=debug）
DebugLevel 3

# ── その他 ───────────────────────────────────────────────────
# 最大クライアント数
MaxClients 30

# ハートビート間隔（秒）
CheckInterval 30
