<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3939SPOT - WiFi接続完了</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
            background: #1a1a1a;
            color: #fff;
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            padding: 20px;
        }
        .card {
            background: #2a2a2a;
            border-radius: 16px;
            padding: 48px 32px;
            max-width: 400px;
            width: 100%;
            text-align: center;
        }
        .icon { font-size: 3rem; margin-bottom: 16px; }
        h1 {
            font-size: 1.6rem;
            font-weight: 900;
            color: #f5c518;
            margin-bottom: 12px;
        }
        p {
            font-size: 1rem;
            color: #ccc;
            margin-bottom: 32px;
            line-height: 1.6;
        }
        .btn {
            display: block;
            width: 100%;
            padding: 18px;
            background: #f5c518;
            color: #1a1a1a;
            font-size: 1.1rem;
            font-weight: 700;
            border-radius: 50px;
            text-decoration: none;
            border: none;
            cursor: pointer;
        }
        .btn:active { opacity: 0.85; }
        .note {
            margin-top: 20px;
            font-size: 0.8rem;
            color: #555;
        }
    </style>
</head>
<body>
    <div class="card">
        <div class="icon">📡</div>
        <h1>WiFiに接続しました</h1>
        <p>ブラックサンダー交換券をゲットするには、こちらをタップしてください。</p>

        {% if spot_id %}
        <a href="/portal/redirect?spot_id={{ spot_id | urlencode }}" class="btn">
            交換券をもらう 🍫
        </a>
        {% else %}
        <a href="/portal/redirect" class="btn">
            交換券をもらう 🍫
        </a>
        {% endif %}

        <p class="note">LINEログインが必要です（無料）</p>
    </div>
</body>
</html>
