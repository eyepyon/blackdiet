<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>3939SPOT - ブラックサンダー交換券</title>
    <style>
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; background: #1a1a1a; color: #fff; }
        .hero { text-align: center; padding: 80px 20px; background: linear-gradient(135deg, #1a1a1a 0%, #333 100%); }
        .hero h1 { font-size: 3rem; font-weight: 900; color: #f5c518; margin-bottom: 16px; }
        .hero p { font-size: 1.2rem; color: #ccc; max-width: 600px; margin: 0 auto 32px; }
        .btn { display: inline-block; padding: 16px 40px; background: #f5c518; color: #1a1a1a; font-size: 1rem; font-weight: 700; border-radius: 50px; text-decoration: none; }
        .features { display: flex; flex-wrap: wrap; justify-content: center; gap: 24px; padding: 60px 20px; max-width: 1000px; margin: 0 auto; }
        .feature { background: #2a2a2a; border-radius: 12px; padding: 32px; flex: 1; min-width: 220px; max-width: 280px; text-align: center; }
        .feature h3 { font-size: 1.1rem; margin-bottom: 8px; color: #f5c518; }
        .feature p { font-size: 0.9rem; color: #aaa; }
        footer { text-align: center; padding: 32px; color: #555; font-size: 0.8rem; }
    </style>
</head>
<body>
    <div class="hero">
        <h1>3939SPOT</h1>
        <p>無料WiFiスポットでブラックサンダー交換券をゲット！<br>LINEで簡単ログイン、全国の提携店・ADトラックで使えます。</p>
        <a href="/auth/line/login" class="btn">LINEでログインして交換券をもらう</a>
    </div>

    <div class="features">
        <div class="feature">
            <h3>📡 WiFiスポット</h3>
            <p>提携店のWiFiに接続するだけで交換券を取得できます。</p>
        </div>
        <div class="feature">
            <h3>🚚 ADトラック</h3>
            <p>街で見かけたADトラックのQRコードをスキャン！</p>
        </div>
        <div class="feature">
            <h3>🍫 交換券</h3>
            <p>1日1枚取得可能。有効期限は取得日から30日間。</p>
        </div>
        <div class="feature">
            <h3>🗺️ 提携店マップ</h3>
            <p><a href="/map" style="color:#f5c518;">近くの提携店</a>を地図で探せます。</p>
        </div>
    </div>

    <footer>
        <p>&copy; 2024 3939SPOT. All rights reserved.</p>
        <p><a href="/partner" style="color:#555;">提携店舗様へ</a></p>
    </footer>
</body>
</html>
