version: "3.9"

# ローカル開発用 Docker Compose
# DB: SQLite（ファイルベース、コンテナ不要）
# セッション: Flask標準Cookieセッション（Redis不要）
# 外部サービス依存ゼロ → docker compose up だけで起動

services:
  web:
    build: .
    ports:
      - "5000:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - sqlite_data:/data  # SQLiteファイルの永続化
    environment:
      DATABASE_URL: "sqlite:////data/dev.db"
      FLASK_ENV: "development"
    command: ["flask", "run", "--host=0.0.0.0", "--port=8080", "--reload"]

volumes:
  sqlite_data:
