version: "3.9"

# ローカル開発用 Docker Compose
# DB: SQLite（ファイルベース、コンテナ不要）
# Redis: ローカルRedis（開発用）または REDIS_URL 未設定でfilesystemセッションにフォールバック

services:
  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 5s

  web:
    build: .
    depends_on:
      redis:
        condition: service_healthy
    ports:
      - "5000:8080"
    env_file:
      - .env
    volumes:
      - .:/app
      - sqlite_data:/data  # SQLiteファイルの永続化
    environment:
      DATABASE_URL: "sqlite:////data/dev.db"
    command: ["flask", "run", "--host=0.0.0.0", "--port=8080", "--reload"]

volumes:
  redis_data:
  sqlite_data:
