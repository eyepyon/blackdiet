# Alembic 設定ファイル
# Flask-Migrate が使用する標準的な設定です。
# Flask-Migrate はこのファイルを直接読み込まず、env.py 経由で設定を参照します。

[alembic]
# マイグレーションスクリプトが格納されているディレクトリ
script_location = migrations

# マイグレーションファイルのネーミングパターン
# %%(rev)s: リビジョンID, %%(slug)s: タイトルのスラッグ
file_template = %%(rev)s_%%(slug)s

# タイムゾーン指定（マイグレーションファイルのタイムスタンプ用）
# timezone =

# マイグレーション後に truncate するテーブル数の上限
# truncate_slug_length = 40

# SQLAlchemy の接続 URL（Flask-Migrate 使用時は env.py が上書きするため不要）
# sqlalchemy.url = postgresql://user:pass@localhost/dbname

# バージョンファイルが格納されているディレクトリ（script_location からの相対パス）
# version_locations = %(here)s/bar:%(here)s/bat:%(here)s/versions

# バージョンパス区切り文字
# version_path_separator = os  # os.pathsep を使用
# version_path_separator = ;   # Windows スタイル
# version_path_separator = :   # Unix スタイル

[post_write_hooks]
# マイグレーションファイル生成後に実行するフック（任意）
# hooks = black
# black.type = console_scripts
# black.entrypoint = black

[loggers]
keys = root,sqlalchemy,alembic,flask_migrate

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARN
handlers = console
qualname =

[logger_sqlalchemy]
level = WARN
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[logger_flask_migrate]
level = INFO
handlers =
qualname = flask_migrate

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
